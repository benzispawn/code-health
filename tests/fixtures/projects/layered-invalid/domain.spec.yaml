project:
  name: email-saas
  framework: nestjs
domains:
  - name: billing
    path: src/billing
    controllers:
      - name: BillingController
        path: billing
        routes:
          - method: POST
            path: /change-plan
            handler: changePlan
    services:
      - name: BillingService
        methods:
          - name: changePlan
    repositories:
      - name: PlanRepository
    decorators:
      - name: CurrentUser
